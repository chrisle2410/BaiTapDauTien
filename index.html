<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lê Quyết Chiến - Digital Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Dynamic Background -->
    <div class="background">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="bubble bubble-5"></div>
    </div>

    <!-- Fireworks Container -->
    <div class="fireworks-container"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card" id="profileCard">
            <div class="glass-bg"></div>

            <div class="profile-content">
                <div class="profile-grid">
                    <div class="profile-left">
                        <div class="avatar-wrapper">
                            <img src="https://scontent.fhan14-3.fna.fbcdn.net/v/t39.30808-1/486498017_4108955096053846_957083468476512696_n.jpg?stp=dst-jpg_s200x200_tt6&_nc_cat=111&ccb=1-7&_nc_sid=1d2534&_nc_eui2=AeETK7anke__sPNTXI4zkXhVf8ZOGVbeB0Z_xk4ZVt4HRuboSTCAPq93a6wo3Rxi3ptSQW2n4INaJqcd26M-SZ5_&_nc_ohc=feINun_-yfoQ7kNvwEhc0I0&_nc_oc=AdpDV9Eqq9Dt-X0njhKzTvt6kyGYShH_XStSpshRjpe-0U7w1sxNW8Zt9SehcZbEQVc&_nc_zt=24&_nc_ht=scontent.fhan14-3.fna&_nc_gid=o0MOn0cNgntJf8k7M8W2bw&_nc_ss=7a3a8&oh=00_Af1O6QiNd7lXNPHM1FRlribzVq5n1e7gOqeho8zfzc1G-Q&oe=69E76AED" alt="Lê Quyết Chiến" class="avatar">
                            <div class="avatar-border"></div>
                        </div>

                        <div class="info-section">
                            <h1 class="name">Lê Quyết Chiến</h1>
                            <p class="title">Admin DVKH</p>
                            <p class="subtitle">Digital Professional | Tech Enthusiast</p>
                        </div>

                        <div class="bio">
                            <p>Chuyên nghiệp, tâm huyết và luôn sẵn sàng phục vụ với giải pháp số hóa hiện đại.</p>
                        </div>
                    </div>

                    <div class="profile-right">
                        <div class="social-links">
                            <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="social-link facebook" title="Facebook">
                                <i class="fab fa-facebook-f"></i>
                                <span class="glow"></span>
                            </a>
                            <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="social-link instagram" title="Instagram">
                                <i class="fab fa-instagram"></i>
                                <span class="glow"></span>
                            </a>
                            <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="social-link linkedin" title="LinkedIn">
                                <i class="fab fa-linkedin-in"></i>
                                <span class="glow"></span>
                            </a>
                        </div>

                        <div class="message-form">
                            <h3>Để lại lời nhắn</h3>
                            <form id="messageForm">
                                <input type="text" id="senderName" placeholder="Tên của bạn" required>
                                <textarea id="messageText" placeholder="Lời nhắn..." required></textarea>
                                <button type="submit" class="send-btn">Gửi</button>
                            </form>
                        </div>

                        <div class="action-buttons">
                            <button class="gift-btn" id="giftBtn">
                                <i class="fas fa-gift"></i>
                                <span>Tặng Quà</span>
                                <span class="ripple"></span>
                            </button>
                            <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="cta-btn">
                                Liên Hệ
                            </a>
                            <button class="play-game-btn" id="playGameBtn">
                                <i class="fas fa-gamepad"></i>
                                <span>Chơi Game</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>Game Lật Thẻ - Tìm Cặp Con Vật</h2>
            <div id="gameStats">
                <p>Lần lật: <span id="moves">0</span> | Cặp tìm được: <span id="matched">0</span>/8</p>
            </div>
            <div id="memoryGrid"></div>
            <div id="gameControls">
                <button id="newGameBtn">Game Mới</button>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
