<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lê Quyết Chiến - Digital Profile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Dynamic Background -->
    <div class="background">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="bubble bubble-5"></div>
    </div>

    <!-- Fireworks Container -->
    <div class="fireworks-container"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Profile Card -->
        <div class="profile-card" id="profileCard">
            <div class="glass-bg"></div>
            
            <div class="profile-content">
                <!-- Avatar -->
                <div class="avatar-wrapper">
                    <img src="https://platform-lookaside.fbsbx.com/platform/profilepic/?asid=100012345678901&height=500&width=500&ext=1234567890&hash=AeS6cuWP-placeholder" alt="Lê Quyết Chiến" class="avatar">
                    <div class="avatar-border"></div>
                </div>

                <!-- Info Section -->
                <div class="info-section">
                    <h1 class="name">Lê Quyết Chiến</h1>
                    <p class="title">Admin DVKH</p>
                    <p class="subtitle">Digital Professional | Tech Enthusiast</p>
                </div>

                <!-- Bio -->
                <div class="bio">
                    <p>Chuyên nghiệp, tâm huyết và luôn sẵn sàng phục vụ!</p>
                </div>

                <!-- Social Links -->
                <div class="social-links">
                    <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="social-link facebook" title="Facebook">
                        <i class="fab fa-facebook-f"></i>
                        <span class="glow"></span>
                    </a>
                    <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="social-link instagram" title="Instagram">
                        <i class="fab fa-instagram"></i>
                        <span class="glow"></span>
                    </a>
                    <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="social-link linkedin" title="LinkedIn">
                        <i class="fab fa-linkedin-in"></i>
                        <span class="glow"></span>
                    </a>
                </div>

                <!-- Gift Button -->
                <button class="gift-btn" id="giftBtn">
                    <i class="fas fa-gift"></i>
                    <span>Tặng Quà</span>
                    <span class="ripple"></span>
                </button>

                <!-- CTA Button -->
                <a href="https://www.facebook.com/quyetchienl/" target="_blank" class="cta-btn">
                    Liên Hệ
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
